[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.bcmath", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "nodejs"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
